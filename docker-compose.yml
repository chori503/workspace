services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-workspace}
      POSTGRES_USER: ${DB_USER:-workspace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-workspace}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-workspace} -d ${DB_NAME:-workspace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-workspace}
      DB_USER: ${DB_USER:-workspace}
      DB_PASSWORD: ${DB_PASSWORD:-workspace}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
