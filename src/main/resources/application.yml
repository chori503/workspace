spring:
  application:
    name: workspace
  profiles:
    active: dev
  datasource:
    hikari:
      pool-name: WorkspaceHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  jwt:
    expiration-minutes: 60
  email:
    welcome:
      subject: "¡Bienvenido a Workspace!"
      body: "Tu cuenta fue creada exitosamente."
